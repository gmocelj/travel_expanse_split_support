<!doctype html>
<html lang="{{ site.lang | default: 'en' }}" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#0A1224" />

    <title>
      {%- if page.title -%}
        {{ page.title }} · {{ site.title }}
      {%- else -%}
        {{ site.title }}
      {%- endif -%}
    </title>

    {%- if site.description -%}
      <meta name="description" content="{{ site.description }}" />
    {%- endif -%}

    <link rel="icon" type="image/png" href="{{ '/assets/images/trevvy-app-icon.png' | relative_url }}" />
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}" />

    <script>
      (() => {
        try {
          const saved = localStorage.getItem("trevvy-theme");
          if (saved) document.documentElement.dataset.theme = saved;
        } catch {}
      })();
    </script>

    <script defer src="{{ '/assets/site.js' | relative_url }}"></script>
  </head>
  <body>
    <header class="topbar">
      <div class="topbar__inner">
        <a class="brand" href="{{ '/' | relative_url }}" aria-label="Trevvy home">
          <img
            class="brand__logo"
            src="{{ '/assets/images/trevvy-app-icon.png' | relative_url }}"
            width="40"
            height="40"
            alt=""
            loading="eager"
          />
          <span class="brand__name">{{ site.title }}</span>
        </a>

        <nav class="nav" aria-label="Primary">
          <a class="nav__link" href="{{ '/' | relative_url }}">Support</a>
          <a class="nav__link" href="{{ '/privacy/' | relative_url }}">Privacy</a>
          <a class="nav__link" href="mailto:support@trevvy.app">Contact</a>
        </nav>

        <button class="themeToggle" type="button" id="themeToggle" aria-label="Toggle theme">
          Theme
        </button>
      </div>
    </header>

    <main class="container">
      <section class="card content">
        {{ content }}
      </section>
    </main>

    <footer class="footer">
      <div class="footer__inner">
        <div class="footer__left">
          <div class="footer__title">{{ site.title }}</div>
          <div class="footer__meta">
            Support: <a href="mailto:support@trevvy.app">support@trevvy.app</a>
          </div>
        </div>
        <div class="footer__right">
          <a href="{{ '/privacy/' | relative_url }}">Privacy Policy</a>
        </div>
      </div>
    </footer>
  </body>
</html>
